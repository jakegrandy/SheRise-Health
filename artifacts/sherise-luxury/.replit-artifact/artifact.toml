kind = "web"
previewPath = "/sherise-luxury/"
title = "SheRises Health — Luxury"
version = "1.0.0"
id = "artifacts/sherise-luxury"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sherise-luxury/" ]
localPort = 18801

[services.development]
run = "pnpm --filter @workspace/sherise-luxury run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sherise-luxury", "run", "build" ]
publicDir = "artifacts/sherise-luxury/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18801"
BASE_PATH = "/sherise-luxury/"
